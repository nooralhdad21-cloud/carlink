<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CarLink Pro | النسخة الاحترافية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-wrapper">
    <aside class="control-panel no-print">
        <div class="brand">
            <h1>CarLink <span>Pro</span></h1>
        </div>

        <div class="scroll-area">
            <div class="setting-group">
                <label>🎨 اختر القالب</label>
                <div class="tpl-selector">
                    <div class="tpl-card active" onclick="setTpl('luxury')" data-tpl="luxury">ملكـي</div>
                    <div class="tpl-card" onclick="setTpl('sport')" data-tpl="sport">رياضـي</div>
                    <div class="tpl-card" onclick="setTpl('modern')" data-tpl="modern">عصـري</div>
                </div>
            </div>

            <div class="setting-group">
                <input type="text" id="inName" placeholder="الاسم الكامل" onkeyup="updateLive()">
                <input type="tel" id="inPhone" placeholder="رقم الهاتف" onkeyup="updateLive()">
                <textarea id="inMsg" placeholder="رسالة الاعتذار..." onkeyup="updateLive()"></textarea>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn-dl" onclick="takeShot()">💾 حفظ الصورة</button>
            <button class="btn-pr" onclick="window.print()">🖨️ طباعة A4</button>
        </div>
    </aside>

    <main class="canvas-stage">
        <div id="cardBox" class="main-card tpl-luxury">
            <div class="card-body">
                <div class="badge">CARLINK SYSTEM</div>
                <p id="outMsg" class="msg-text">أعتذر عن الوقوف الخاطئ، يرجى الاتصال بي</p>
                <div class="phone-display">
                    <span id="outPhone">07XXXXXXXXX</span>
                </div>
                <h2 id="outName">المهندس نورالدين صباح</h2>
                
                <div class="card-footer">
                    <div class="legal">
                        <p>تطوير: المهندس نورالدين صباح</p>
                        <small>nooralhdad21-cloud.github.io/carlink</small>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
