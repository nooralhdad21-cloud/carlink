<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>CarLink 2026 - البطاقة الذكية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-wrapper">
    <h1>🚗 CarLink 2026</h1>

    <div id="loginSection" class="input-group">
        <label>رقم الهاتف (مفتاح العراق)</label>
        <div class="phone-flex">
            <span>+964</span>
            <input type="text" id="loginPhone" placeholder="7701109692">
        </div>
        <button onclick="login()">ابدأ التصميم الآن</button>
    </div>

    <div id="dashboard" style="display:none;">
        <div class="input-group">
            <label>الاسم الكامل:</label>
            <input type="text" id="nameInput" placeholder="مثال: نورالدين صباح" oninput="updatePreview()">

            <label>مواقع التواصل الاجتماعي:</label>
            <div id="socialInputs"></div>
            <button class="btn-add" onclick="addSocialRow()">➕ إضافة منصة</button>
        </div>

        <div class="action-buttons">
            <button onclick="printA4()" class="btn-print">🖨️ طباعة البطاقة A4</button>
            <button onclick="location.reload()" class="btn-exit">🔄 خروج</button>
        </div>

        <h3 class="preview-title">المعاينة الحية</h3>
        
        <div class="card-container">
            <div id="preview" class="card-premium">
                <div class="card-header">CARLINK SMART CARD</div>
                <h2 id="displayName">نورالدين صباح</h2>
                <p id="displayPhone">+964 770 110 9692</p>
                
                <div id="displaySocial" class="social-icons-preview"></div>

                <div id="qrcode"></div>
                
                <div class="card-footer">
                    نظام الربط الذكي للسيارات 2026 © <br>
                    تواصل معي عبر مسح الكود أعلاه
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>   
<script src="script.js"></script>
</body>
</html>
