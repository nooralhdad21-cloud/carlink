<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CarLink Pro | المهندس نورالدين</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <section class="preview-box">
        <div id="cardBox" class="main-card tpl-luxury">
            <div class="card-inner">
                <p id="outMsg" class="msg-text">أعتذر عن الوقوف الخاطئ، يرجى الاتصال بي</p>
                <div class="phone-num">
                    <span id="outPhone">07XXXXXXXXX</span>
                </div>
                <h2 id="outName">صاحب السيارة</h2>
                <div class="card-footer">
                    <small>nooralhdad21-cloud.github.io/carlink</small>
                </div>
            </div>
        </div>
    </section>

    <aside class="editor-panel no-print">
        <div class="tabs">
            <button class="tab-btn active" onclick="setTpl('luxury')">ملكي</button>
            <button class="tab-btn" onclick="setTpl('sport')">رياضي</button>
        </div>

        <div class="input-fields">
            <input type="text" id="inName" placeholder="الاسم الكامل" oninput="updateLive()">
            <input type="tel" id="inPhone" placeholder="رقم الهاتف" oninput="updateLive()">
            <textarea id="inMsg" placeholder="رسالة الاعتذار..." oninput="updateLive()"></textarea>
        </div>

        <div class="main-actions">
            <button class="btn-save" onclick="takeShot()">💾 حفظ كصورة</button>
            <button class="btn-print" onclick="window.print()">🖨️ طباعة</button>
        </div>
        
        <p class="rights">تطوير: المهندس نورالدين صباح</p>
    </aside>
</div>

<script src="script.js"></script>
</body>
</html>
