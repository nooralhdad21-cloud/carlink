<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarLink Designer | منصة التصميم الذكية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar no-print">
            <div class="logo">🚗 CarLink <span>v2.0</span></div>
            
            <div class="tool-section">
                <h3>🎨 اختر القالب</h3>
                <div class="template-grid">
                    <div class="tpl-thumb gold" onclick="setTemplate('gold')">ذهبي</div>
                    <div class="tpl-thumb dark" onclick="setTemplate('dark')">رياضي</div>
                    <div class="tpl-thumb blue" onclick="setTemplate('blue')">احترافي</div>
                </div>
            </div>

            <div class="tool-section">
                <h3>✍️ تعديل البيانات</h3>
                <input type="text" id="inName" placeholder="الاسم (مثلاً: صاحب السيارة)" oninput="syncData()">
                <input type="text" id="inPhone" placeholder="رقم الهاتف" oninput="syncData()">
                <input type="text" id="inInsta" placeholder="يوزر انستجرام" oninput="syncData()">
                <textarea id="inMsg" placeholder="رسالة الاعتذار..." oninput="syncData()"></textarea>
            </div>

            <div class="tool-section">
                <button class="btn-save" onclick="saveAsImage()">🖼️ حفظ كصورة PNG</button>
                <button class="btn-print" onclick="window.print()">🖨️ طباعة A4</button>
            </div>
        </aside>

        <main class="preview-area">
            <div id="cardCanvas" class="card tpl-gold">
                <div class="card-inner">
                    <div id="outMsg" class="card-header">أعتذر عن الوقوف الخاطئ</div>
                    <h2 id="outName">صاحب السيارة</h2>
                    <div id="outPhone">07XXXXXXXXX</div>
                    
                    <div class="card-footer">
                        <span id="outInsta"></span>
                        <div class="dev-info">
                            تطوير: المهندس نورالدين صباح <br>
                            <span class="domain-text">nooralhdad21-cloud.github.io/carlink</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
