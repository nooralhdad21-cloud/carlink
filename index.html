<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artiva | منصة التصميم الاحترافية المجانية</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">

    <style>
        /* إعدادات المتصفح الأساسية لضمان عمل التصميم بشكل صحيح */
        body {
            margin: 0;
            padding: 0;
            background-color: #07060F; /* نفس لون الخلفية في كود JSX */
            color: #F0EEF8;
            font-family: 'Plus Jakarta Sans', 'Cairo', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }

        /* حاوية مشروع React */
        #root {
            min-height: 100vh;
        }

        /* تأثير تحميل بسيط للموقع قبل تشغيل الجافا سكريبت */
        .loader {
            display: flex;
            justify-content: center;
            alignItems: center;
            height: 100vh;
            font-size: 1.5rem;
            font-weight: bold;
            color: #7C5CFC;
        }
    </style>
</head>
<body>

    <div id="root">
        <div class="loader">جاري تحميل Artiva...</div>
    </div>

    <script src="https://apis.google.com/js/api.js"></script>

</body>
</html>
