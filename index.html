<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarLink | بطاقة اعتذار ذكية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container no-print">
        <header>
            <h1>🚗 CarLink | بطاقة اعتذار</h1>
            <p>تصميم مميز المهندس نورالدين صباح</p>
        </header>

        <section id="loginSection" class="panel">
            <h3>أدخل رقم هاتفك (يظهر بوضوح خلف الزجاج)</h3>
            <input type="text" id="loginPhone" placeholder="مثال: 07701109692" maxlength="11">
            <button class="btn-primary" onclick="login()">إنشاء بطاقتي الفخمة</button>
        </section>

        <section id="dashboard" class="panel" style="display:none;">
            <div class="input-group">
                <input type="text" id="nameInput" placeholder="الاسم الكامل (اختياري)" oninput="updatePreview()">
                <input type="text" id="instaUser" placeholder="يوزر انستجرام (اختياري)" oninput="updatePreview()">
            </div>
            
            <div class="actions">
                <button class="btn-success" onclick="window.print()">🖨️ طباعة A4</button>
                <button class="btn-image" onclick="downloadCard()">🖼️ حفظ كصورة</button>
            </div>
        </section>
    </div>

    <div id="printArea">
        <div id="captureTarget" class="card-premium">
            <div class="card-content">
                <div id="sorryMessage" class="sorry-text"></div>
                
                <div class="call-text">في حال الضرورة اتصل بي:</div>
                
                <div id="displayPhone">077XXXXXXXX</div>
                
                <h2 id="displayName">نورالدين صباح</h2>
                
                <div class="card-socials">
                    <span id="instaLabel"></span>
                </div>
                <footer class="card-footer-text">
                    تصميم وتطوير: المهندس نورالدين صباح <br>
                    Instagram: @eng.nooraldein | Telegram: @rucno
                </footer>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
