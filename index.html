<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CarLink Pro | المهندس نورالدين</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <section class="preview-area">
            <div id="cardBox" class="main-card tpl-luxury">
                <p id="outMsg" class="msg-display">أعتذر عن الوقوف الخاطئ، يرجى الاتصال بي</p>
                <div class="phone-display">
                    <span id="outPhone">07701109692</span>
                </div>
                <h2 id="outName">المهندس نورالدين صباح</h2>
                <div class="card-footer">
                    nooralhdad21-cloud.github.io/carlink
                </div>
            </div>
        </section>

        <aside class="editor-panel no-print">
            <div class="tabs">
                <button class="tab-btn active" onclick="setTpl('luxury', this)">ملكي</button>
                <button class="tab-btn" onclick="setTpl('sport', this)">رياضي</button>
                <button class="tab-btn" onclick="setTpl('modern', this)">عصري</button>
            </div>

            <div class="inputs">
                <input type="text" id="inName" placeholder="الاسم الكامل" oninput="updateLive()">
                <input type="tel" id="inPhone" placeholder="رقم الهاتف" oninput="updateLive()">
                <textarea id="inMsg" rows="2" placeholder="رسالة الاعتذار..." oninput="updateLive()"></textarea>
            </div>

            <div class="actions">
                <button class="btn-save" onclick="takeShot()">💾 حفظ الصورة</button>
                <button class="btn-print" onclick="window.print()">🖨️ طباعة</button>
            </div>
            <p class="rights-text">تطوير المهندس نورالدين صباح 2026</p>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
