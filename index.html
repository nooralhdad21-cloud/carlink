<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CarLink Pro | المهندس نورالدين صباح</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #d4af37; --accent: #00d2ff; --dark: #0a0e17; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--dark); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* منطقة المعاينة - النصف العلوي */
        .preview-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 15px; background: radial-gradient(circle, #1e293b 0%, #0a0e17 100%); }
        
        .main-card { 
            width: 100%; max-width: 420px; aspect-ratio: 1.6 / 1; border-radius: 15px; 
            padding: 25px; display: flex; flex-direction: column; justify-content: center; 
            text-align: center; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .tpl-luxury { background: #000; border: 3px solid var(--gold); color: #fff; }
        .tpl-sport { background: #1e1b4b; border-right: 15px solid #ef4444; color: #fff; }
        .tpl-modern { background: #fff; color: #000 !important; border: 1px solid #ddd; }

        .phone-display { font-size: clamp(24px, 8vw, 38px); font-weight: 900; margin: 5px 0; }
        .msg-display { font-size: 14px; opacity: 0.8; }
        #outName { font-size: 18px; margin-top: 5px; opacity: 0.7; }

        /* لوحة التحكم - النصف السفلي */
        .editor-panel { background: #161e2d; padding: 15px; border-top: 2px solid #2d3748; border-radius: 20px 20px 0 0; }
        .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; background: #2d3748; color: white; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--accent); color: #000; }

        input, textarea { width: 100%; background: #0a0e17; border: 1px solid #334155; padding: 12px; border-radius: 8px; color: white; margin-bottom: 8px; outline: none; }
        
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-save { background: var(--accent); color: #000; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-print { background: transparent; color: white; border: 1px solid white; border-radius: 10px; cursor: pointer; }

        @media (min-width: 768px) { body { flex-direction: row; } .editor-panel { width: 380px; height: 100vh; border-radius: 0; } }
    </style>
</head>
<body>

    <div class="preview-area">
        <div id="cardBox" class="main-card tpl-luxury">
            <p id="outMsg" class="msg-display">أعتذر عن الوقوف الخاطئ، يرجى الاتصال بي</p>
            <div class="phone-display"><span id="outPhone">07701109692</span></div>
            <h2 id="outName">المهندس نورالدين صباح</h2>
        </div>
    </div>

    <aside class="editor-panel">
        <div class="tabs">
            <button class="tab-btn active" onclick="setTpl('luxury', this)">ملكي</button>
            <button class="tab-btn" onclick="setTpl('sport', this)">رياضي</button>
            <button class="tab-btn" onclick="setTpl('modern', this)">عصري</button>
        </div>

        <input type="text" id="inName" placeholder="الاسم الكامل" oninput="updateLive()">
        <input type="tel" id="inPhone" placeholder="رقم الهاتف" oninput="updateLive()">
        <textarea id="inMsg" rows="2" placeholder="رسالة الاعتذار..." oninput="updateLive()"></textarea>

        <div class="actions">
            <button class="btn-save" onclick="takeShot()">💾 حفظ الصورة</button>
            <button class="btn-print" onclick="window.print()">🖨️ طباعة</button>
        </div>
    </aside>

    <script>
        function updateLive() {
            document.getElementById('outName').innerText = document.getElementById('inName').value || "المهندس نورالدين صباح";
            document.getElementById('outPhone').innerText = document.getElementById('inPhone').value || "07701109692";
            document.getElementById('outMsg').innerText = document.getElementById('inMsg').value || "أعتذر عن الوقوف الخاطئ، يرجى الاتصال بي";
        }

        function setTpl(style, btn) {
            document.getElementById('cardBox').className = 'main-card tpl-' + style;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function takeShot() {
            const btn = document.querySelector('.btn-save');
            btn.innerText = "جاري الحفظ...";
            html2canvas(document.getElementById('cardBox'), { scale: 3, useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'CarLink-Card.png';
                link.href = canvas.toDataURL();
                link.click();
                btn.innerText = "💾 حفظ الصورة";
            });
        }
    </script>
</body>
</html>
